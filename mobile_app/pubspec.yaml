name: handwriting_learning_app
description: A children's handwriting learning app with ML-powered evaluation
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # ML Inference
  # tflite_flutter: ^0.10.0  # Uncomment for TensorFlow Lite
  # onnxruntime: ^1.0.0       # Uncomment for ONNX Runtime
  # Storage
  shared_preferences: ^2.2.0
  sqflite: ^2.3.0
  # State Management
  provider: ^6.1.0
  # UI
  cupertino_icons: ^1.0.6
  # Optional: Cloud sync
  # http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/animations/
    - assets/sounds/
    - assets/fonts/
    - ../ml_models/pretrained/
